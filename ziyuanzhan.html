<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ACGN索引 · 试验版</title>
    <style>
        body, div, h1, h2, p, a, span, ul, li {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            padding: 20px 16px 60px;
            color: #eef;
        }

        /* 试验标记 */
        .experiment-badge {
            background: #5fad56;
            color: #0a0a1a;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 12px;
            vertical-align: middle;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            padding: 16px 0 12px;
            border-bottom: 1px solid #334;
            margin-bottom: 28px;
        }

        .title-box h1 {
            font-size: 26px;
            background: linear-gradient(135deg, #fff, #7cb8ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .title-box p {
            font-size: 12px;
            color: #889;
            margin-top: 4px;
        }

        .refresh-btn {
            background: #1e1e3a;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            color: #7cb8ff;
            border: 1px solid #7cb8ff;
            cursor: pointer;
            transition: 0.2s;
        }
        .refresh-btn:active { transform: scale(0.96); }
        .refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* 分类卡片 */
        .category {
            margin-bottom: 32px;
            background: rgba(20, 20, 36, 0.6);
            border-radius: 24px;
            padding: 16px 18px;
            border: 1px solid #2a2a44;
        }
        .category-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 14px;
            padding-left: 8px;
            border-left: 4px solid;
        }
        .direct .category-title { border-left-color: #5fad56; color: #c8e6c9; }
        .proxy .category-title { border-left-color: #f2c94c; color: #fff3c9; }
        .dead .category-title { border-left-color: #b91c1c; color: #fcd9d9; }

        .link-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }
        @media (min-width: 700px) {
            .link-list { grid-template-columns: repeat(2, 1fr); }
        }

        .link-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 10px 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.15s;
            border: 1px solid #2a2a44;
        }
        .link-card:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: #7cb8ff;
        }

        .link-icon {
            width: 36px;
            height: 36px;
            background: #0f0f1a;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }
        .link-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }
        .icon-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #7cb8ff;
            background: #0f0f1a;
            border-radius: 10px;
        }
        .link-info { flex: 1; }
        .link-name { font-size: 14px; font-weight: 500; color: #fff; }
        .link-url { font-size: 10px; color: #889; margin-top: 2px; }
        .status-badge {
            font-size: 9px;
            background: #1a1a2e;
            display: inline-block;
            padding: 2px 6px;
            border-radius: 20px;
            margin-top: 4px;
            color: #aaa;
        }
        .link-arrow { color: #7cb8ff; font-size: 16px; }

        .easter-egg {
            text-align: center;
            margin-top: 40px;
            padding: 12px;
            cursor: pointer;
            font-size: 12px;
            color: #7cb8aa;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
        }

        /* 模态窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-card {
            background: #1a1a2a;
            border-radius: 24px;
            padding: 20px;
            max-width: 90%;
            max-height: 80%;
            overflow: auto;
            border: 1px solid #f2c94c;
        }
        .modal-card h3 { margin-bottom: 12px; color: #f2c94c; }
        .modal-card table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .modal-card td, .modal-card th {
            border: 1px solid #334;
            padding: 6px 8px;
        }
        .modal-card button {
            margin-top: 16px;
            background: #f2c94c;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
        }
        .empty-msg {
            text-align: center;
            padding: 24px;
            color: #889;
        }
        .disclaimer {
            text-align: center;
            font-size: 10px;
            color: #666;
            margin-top: 20px;
            border-top: 1px solid #2a2a44;
            padding-top: 16px;
        }
    </style>
</head>

                { name: "Pan jlbx", url: "https://pan.jlbx.xyz/" }

        let dynamicSites = [];
        let pendingReport = null;

        function getHost(url) {
            try {
                return new URL(url).hostname.replace(/^www\./, '');
            } catch {
                return url.split('/')[2] || '';
            }
        }

        function escape(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m));
        }

        function probeReachable(url) {
            return new Promise((resolve) => {
                const img = new Image();
                const timeout = setTimeout(() => {
                    img.src = '';
                    resolve(false);
                }, 4000);
                img.onload = () => {
                    clearTimeout(timeout);
                    resolve(true);
                };
                img.onerror = () => {
                    clearTimeout(timeout);
                    resolve(false);
                };
                img.src = url + 'favicon.ico?t=' + Date.now();
            });
        }

        async function probeLimit(urls, limit = 6) {
            const results = [];
            const queue = [...urls];
            async function worker() {
                while (queue.length) {
                    const url = queue.shift();
                    const ok = await probeReachable(url);
                    results.push(ok);
                }
            }
            const workers = Array(Math.min(limit, urls.length)).fill().map(() => worker());
            await Promise.all(workers);
            return results;
        }

        function createIconHtml(host) {
            return `
                <div class="link-icon">
                    <img src="https://${host}/favicon.ico" loading="lazy"
                         onerror="this.style.display='none'; this.nextSibling.style.display='flex';"
                         style="width:100%;height:100%;object-fit:contain;">
                    <div class="icon-placeholder" style="display:none;">ACGN</div>
                </div>
            `;
        }

        function render() {
            const directItems = dynamicSites.filter(s => s.category === 'direct');
            const deadItems = dynamicSites.filter(s => s.category === 'dead');
            const proxyItems = SITES.proxy;

            function buildHTML(items, showStatus = true) {
                if (!items.length) return '<div class="empty-msg">✨ 暂无</div>';
                return items.map(item => {
                    const host = getHost(item.url);
                    const statusLabel = item.alive === true ? '✓ 可达' : (item.alive === false ? '✗ 不可达' : '❔ 未测');
                    return `
                        <a href="${item.url}" class="link-card" target="_blank" rel="noopener">
                            ${createIconHtml(host)}
                            <div class="link-info">
                                <div class="link-name">${escape(item.name)}</div>
                                <div class="link-url">${escape(host)}</div>
                                ${showStatus ? `<div class="status-badge">${statusLabel}</div>` : ''}
                            </div>
                            <span class="link-arrow">→</span>
                        </a>
                    `;
                }).join('');
            }

            document.getElementById('directList').innerHTML = buildHTML(directItems, true);
            document.getElementById('proxyList').innerHTML = buildHTML(proxyItems, false);
            document.getElementById('deadList').innerHTML = buildHTML(deadItems, true);
        }

        function initDynamic() {
            dynamicSites = [];
            SITES.direct.forEach(s => dynamicSites.push({ ...s, category: 'direct', alive: null }));
            SITES.dead.forEach(s => dynamicSites.push({ ...s, category: 'dead', alive: null }));
        }

        async function startProbe() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '⟳ 探测中...';

            const urls = dynamicSites.map(s => s.url);
            const results = await probeLimit(urls, 6);

            const changes = [];
            for (let i = 0; i < dynamicSites.length; i++) {
                const alive = results[i];
                const oldCat = dynamicSites[i].category;
                const newCat = alive ? 'direct' : 'dead';
                changes.push({
                    idx: i,
                    name: dynamicSites[i].name,
                    oldCat,
                    newCat,
                    alive
                });
            }

            const toDirect = changes.filter(c => c.oldCat === 'dead' && c.newCat === 'direct');
            const toDead = changes.filter(c => c.oldCat === 'direct' && c.newCat === 'dead');

            let reportHtml = '';
            if (toDirect.length) {
                reportHtml += `<h4>📈 失效区 → 直连区 (${toDirect.length})</h4><table><th>站点</th><th>结果</th></td>`;
                toDirect.forEach(c => reportHtml += `<tr><td>${escape(c.name)}</td><td>可达</td></tr>`);
                reportHtml += `</table>`;
            }
            if (toDead.length) {
                reportHtml += `<h4>📉 直连区 → 失效区 (${toDead.length})</h4><table><th>站点</th><th>结果</th></tr>`;
                toDead.forEach(c => reportHtml += `<tr><td>${escape(c.name)}</td><td>不可达</td></tr>`);
                reportHtml += `</table>`;
            }
            if (!toDirect.length && !toDead.length) {
                reportHtml += `<p>✨ 无变动，所有站点状态与上次一致。</p>`;
            }
            reportHtml += `<p style="margin-top:12px;color:#aaa;">※ 探测仅尝试加载图标，结果仅供参考。</p>`;

            pendingReport = changes;
            document.getElementById('reportBody').innerHTML = reportHtml;
            document.getElementById('reportModal').style.display = 'flex';

            btn.disabled = false;
            btn.textContent = '⟳ 探测存活';
        }

        function applyReport() {
            if (!pendingReport) return;
            for (const ch of pendingReport) {
                dynamicSites[ch.idx].category = ch.newCat;
                dynamicSites[ch.idx].alive = ch.alive;
            }
            render();
            pendingReport = null;
            document.getElementById('reportModal').style.display = 'none';
        }

        document.getElementById('refreshBtn').addEventListener('click', startProbe);
        document.getElementById('closeReportBtn').addEventListener('click', applyReport);
        document.getElementById('reportModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('reportModal')) applyReport();
        });
        document.getElementById('qqEgg').addEventListener('click', () => {
            window.open('https://qun.qq.com/universal-share/share?ac=1&authKey=JW1QktW0FLJf%2B0amxhCrt2Tciwsbi9Q22AXg57sx%2FhALND1gOghuqTkVXwMN69OX', '_blank');
        });

        initDynamic();
        render();
    })();
